<!doctype html>
<html lang="ka">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Furnituremodern — site design</title>
<link rel="stylesheet" href="styles/system.css" />
<style>
  /* Canvas-only overrides — make every artboard render in light bone surface
     even when the page itself is dark, so artboard chrome stays visible. */
  body { background: #ece4d4; }
  /* Inside the design canvas, sections that should be sticky must not stick
     to the page; suppress sticky behavior so artboards render as static. */
  [data-screen-label] [style*="position: sticky"] { position: static !important; top: auto !important; }
  /* Reveal helpers default-on inside artboards (no scroll context). */
  [data-reveal] { opacity: 1 !important; transform: none !important; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="components/site-chrome.jsx"></script>
<script type="text/babel" src="components/page-homepage.jsx"></script>
<script type="text/babel" src="components/page-homepage-mobile.jsx"></script>
<script type="text/babel" src="components/page-category.jsx"></script>
<script type="text/babel" src="components/page-product.jsx"></script>
<script type="text/babel" src="components/page-chrome-showcase.jsx"></script>
<script type="text/babel" src="components/page-privacy.jsx"></script>

<script type="text/babel">
  const {
    DesignCanvas, DCSection, DCArtboard,
    HomepageDesktop, HomepageMobile,
    CategoryPage, ProductDesktop, ProductMobile,
    HeaderShowcase, FooterShowcase, CookieShowcase,
    PrivacyPage,
  } = window;

  function App() {
    return (
      <DesignCanvas
        title="Furnituremodern"
        subtitle="Editorial e-commerce · Tbilisi · Phase 6 system"
      >
        <DCSection id="home" title="I — Homepage">
          <DCArtboard id="home-desktop" label="Homepage · Desktop 1440" width={1440} height={5400}>
            <HomepageDesktop />
          </DCArtboard>
          <DCArtboard id="home-mobile" label="Homepage · Mobile 375" width={375} height={2400}>
            <HomepageMobile />
          </DCArtboard>
        </DCSection>

        <DCSection id="category" title="II — Category (Sofas)">
          <DCArtboard id="cat-desktop" label="Sofas · Desktop 1440" width={1440} height={2800}>
            <CategoryPage />
          </DCArtboard>
        </DCSection>

        <DCSection id="product" title="III — Product detail (Alazani)">
          <DCArtboard id="prod-desktop" label="Product · Desktop 1440" width={1440} height={3200}>
            <ProductDesktop />
          </DCArtboard>
          <DCArtboard id="prod-mobile" label="Product · Mobile 375" width={375} height={1500}>
            <ProductMobile />
          </DCArtboard>
        </DCSection>

        <DCSection id="chrome" title="IV — Header, Footer, Cookies">
          <DCArtboard id="header" label="Navigation header · transparent + scrolled + mobile drawer" width={1440} height={1100}>
            <HeaderShowcase />
          </DCArtboard>
          <DCArtboard id="footer" label="Footer" width={1440} height={620}>
            <FooterShowcase />
          </DCArtboard>
          <DCArtboard id="cookie" label="Cookie consent banner" width={1440} height={400}>
            <CookieShowcase />
          </DCArtboard>
        </DCSection>

        <DCSection id="privacy" title="V — Privacy policy">
          <DCArtboard id="privacy-desktop" label="Privacy · Desktop 1440" width={1440} height={2400}>
            <PrivacyPage />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
